<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="50%" style="stop-color:#16213e"/>
      <stop offset="100%" style="stop-color:#0f3460"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#76B900"/>
      <stop offset="100%" style="stop-color:#5A8B00"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative grid -->
  <g opacity="0.05" stroke="#76B900" stroke-width="1">
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
  </g>

  <!-- Accent bar -->
  <rect x="0" y="0" width="1200" height="6" fill="url(#accent)"/>

  <!-- Logo circle -->
  <circle cx="160" cy="265" r="80" fill="url(#accent)"/>
  <text x="160" y="278" font-family="Arial, Helvetica, sans-serif" font-size="52" font-weight="bold" fill="white" text-anchor="middle">CG</text>
  <text x="160" y="310" font-family="Arial, Helvetica, sans-serif" font-size="16" fill="white" text-anchor="middle" opacity="0.9">CyberGoDev</text>

  <!-- Title -->
  <text x="290" y="240" font-family="Arial, Helvetica, sans-serif" font-size="72" font-weight="bold" fill="#ffffff">CyberGo</text>

  <!-- Subtitle -->
  <text x="290" y="300" font-family="Arial, Helvetica, sans-serif" font-size="28" fill="#b0b0b0">High-Performance Go Open-Source Libraries</text>

  <!-- Feature tags -->
  <rect x="290" y="350" width="90" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="335" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">JSON</text>

  <rect x="395" y="350" width="70" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="430" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">JWT</text>

  <rect x="480" y="350" width="90" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="525" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">HTTPC</text>

  <rect x="585" y="350" width="85" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="627" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">HTML</text>

  <rect x="685" y="350" width="60" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="715" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">DD</text>

  <rect x="760" y="350" width="80" height="32" rx="4" fill="#76B900" opacity="0.2"/>
  <text x="800" y="372" font-family="monospace" font-size="14" fill="#76B900" text-anchor="middle">ENV</text>

  <!-- URL -->
  <text x="600" y="560" font-family="monospace" font-size="20" fill="#76B900" text-anchor="middle">www.cybergo.dev</text>

  <!-- Bottom accent bar -->
  <rect x="0" y="624" width="1200" height="6" fill="url(#accent)"/>
</svg>
