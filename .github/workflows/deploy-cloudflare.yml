name: Deploy to Cloudflare Pages

# Production deploy path: atomic deploys, global edge caching (see
# public/_headers), and per-PR preview deploys. The old FTP workflow
# (deploy.yml) is now manual-only cold-standby.
#
# PREREQUISITES before merging this to main (else the deploy job fails):
#   - GitHub secrets set: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
#   - Cloudflare Pages project "cybergo-docs" created
#   - DNS: www.cybergo.dev CNAME → cybergo-docs.pages.dev
# Verify with a manual workflow_dispatch run first. See DEPLOY.md.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'scripts/**'
      - 'package.json'
      - 'package-lock.json'
      - 'public/_headers'

permissions:
  contents: read
  deployments: write

concurrency:
  group: cf-pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      # "production" deployment (serves the production branch). For PR preview
      # deploys, prefer connecting the repo in the Cloudflare dashboard (auto
      # builds a preview per PR) — see DEPLOY.md §PR previews.
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy docs/.vitepress/dist --project-name=cybergo-docs --branch=main
