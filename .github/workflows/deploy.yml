name: Deploy Docs to Server (FTP)

# Production deploy: fires on push to main. In the fork-based contribution flow
# (rnb3ds/docs-site → PR → cybergodev/docs-site), a push to main happens exactly
# when a PR is merged — so this deploys on merge. Pushes/commits to the fork
# never reach this repo and never trigger this workflow.
#
# Why `push` and not `pull_request`: workflows triggered by pull_request events
# from a fork do NOT receive the repo's secrets (GitHub security default), which
# would make the FTP step fail (no FTP_SERVER etc.). The merge's push-to-main
# event has full secret access, so `push` is the correct trigger.
#
# Builds with VitePress and uploads docs/.vitepress/dist/ to the FTP server via
# FTPS. Also runnable manually via the Actions UI (workflow_dispatch). The
# previous Cloudflare Pages workflow was removed in favor of this FTP path.
#
# Prerequisites: GitHub secrets FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, and
# FTP_REMOTE_DIR must be configured, or the FTP deploy step fails.

on:
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: docs/.vitepress/dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftps
