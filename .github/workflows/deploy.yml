name: Deploy Docs to Server (FTP, cold-standby)

# Disabled in favor of Cloudflare Pages (deploy-cloudflare.yml runs on push to
# main). Kept runnable via the Actions UI (workflow_dispatch) as a cold-standby:
# trigger manually if Cloudflare is ever down. To roll back to FTP, re-enable
# the `push:` block below and disable deploy-cloudflare.yml's push trigger.

on:
  workflow_dispatch:
  # push:
  #   branches: [main]
  #   paths:
  #     - 'docs/**'
  #     - 'docs/.vitepress/**'
  #     - 'package.json'
  #     - 'package-lock.json'

concurrency:
  group: deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build with VitePress
        run: npm run build
        env:
          NODE_OPTIONS: --max-old-space-size=7168

      - name: Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          local-dir: docs/.vitepress/dist/
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          protocol: ftps
